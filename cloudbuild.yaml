steps:
  # Copy the google-sheets module into the build context
  - name: 'gcr.io/cloud-builders/git'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cp -r /workspace/google-sheets /workspace/cardkit-wsjpro/google-sheets || true

  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cardkit/cardkit-wsjpro:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cardkit/cardkit-wsjpro:latest'
      - '.'
    dir: 'cardkit-wsjpro'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cardkit/cardkit-wsjpro'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'cardkit-wsjpro'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/cardkit/cardkit-wsjpro:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=NODE_ENV=production,SHEETS_SERVICE_PORT=5050,GCS_BUCKET=dj-newsroom-stag-shared,GCS_PREFIX=jon_leckie'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cardkit/cardkit-wsjpro'
