<!-- SVG element --> <div class="svg col-sm-6" fixed-scroll> <div class="config-wrapper"> <div class="panel"> <h3> Theme <small>Choose the look and feel</small></h3> <!--<select id="theme" ng-model="theme" ng-options="theme.name for theme in config.themes" ng-init="theme = config.themes[0]" class="form-control"></select>--> <label>Background: </label> <div class="btn-group"> <label ng-repeat="theme in config.themes" ng-class="{active: theme.name == $parent.theme.name}" class="btn btn-primary" ng-init="$parent.theme = config.themes[0]"> <input type="radio" ng-model="$parent.theme" ng-value="theme" name="theme-options"> {{theme.name}} </label> </div> <br> <label>Number: </label> <div class="btn-group"> <label ng-repeat="color in config.colors" ng-class="{active: color.name == $parent.color.name}" class="btn btn-primary" ng-init="$parent.color = config.colors[0]"> <input type="radio" ng-model="$parent.color" ng-value="color" name="color-options"> {{color.name}} </label> </div> <br> <label>Size: </label> <div class="btn-group"> <label ng-repeat="size in config.sizes" ng-class="{active: size.name == $parent.size.name}" class="btn btn-primary"> <input type="radio" ng-model="$parent.size" ng-value="size" name="size-options"> {{size.name}} </label> </div> </div> <!--<div class="panel" ng-show="config.output.editable.scale">
        <h3 ng-click="scale = !scale"><i class="glyphicon glyphicon-menu-down" ng-hide="scale"></i><i class="glyphicon glyphicon-menu-right" ng-hide="!scale"></i> Scale ({{config.output.scale}}x) <small>Choose the scaled output size</small></h3>
        <input id="scale" type="range" max="3" min="1" step="1" ng-model="config.output.scale" ng-hide="scale" />
      </div>--> </div> <div class="svg-wrapper" ng-if="((config.themes.length > 0 && theme) || !config.themes) && ((config.sizes.length > 0 && size) || !config.sizes)"> <snap-svg svg-config="config.svg" svg-theme="config.theme" filters="filters" width="{{size.width}}"></snap-svg> <br> <button class="btn btn-default" ng-click="downloadSvg()"><i class="glyphicon glyphicon-floppy-save"></i> Download Image</button> <button class="btn btn-primary" ng-click="sendToGams()" ng-disabled="size.name==='Social'"><i class="glyphicon glyphicon-send"></i> Send to GAMS</button> <!--<button class="btn"  ng-click="fakeData()"><i class="glyphicon glyphicon-send"></i> test data</button>--> </div> <div class="results" ng-hide="!gamsID"> <p><strong>GAMS ID:</strong> {{gamsID}}</p> <ul ng-repeat="url in gamsURLs"> <li><a href="{{url}}" target="_blank">{{url}}</a></li> </ul> </div> <div class="results" ng-hide="!errors"> <p><strong>Error</strong></p> <ul ng-repeat="(error, description) in errors"> <li>{{description}}</li> </ul> </div> </div> <!-- Elements --> <aside class="elements col-sm-6 pull-right"> <div ng-if="(config.themes.length > 0 && theme) || !config.themes"> <div ng-repeat="(key, element) in config.svg.elements" ng-if="element.editable" class="panel"> <h3>{{element.name}}</h3> <div ng-if="element.type !== 'group'" ng-repeat="(type, field) in element.editable" ng-switch="type"> <!-- Text --> <div ng-switch-when="text"> <label>Text</label> <textarea ng-model="element.value" class="form-control" ng-change="element.change" ng-init="element.value=element.value()"></textarea> </div> <!-- Fill --> <div ng-switch-when="fill"> <label>Fill Color</label> <input colorpicker type="text" ng-model="element.fill" ng-if="field == 'picker'" class="form-control"> <select ng-model="element.fill" ng-options="name for (name, value) in field" class="form-control" ng-if="field != 'picker'"> <option value="">-- Select a Fill Color -- </select> </div> <!-- Font Size --> <div ng-switch-when="fontSize"> <label>Font Size</label> <span class="footnote pull-right"><span ng-bind="element.fontSize" ng-init="element.fontSize=element.fontSize()"></span>px</span> <input type="range" max="{{field.max()}}" min="{{field.min()}}" step="1" ng-model="element.fontSize"> <!--<select ng-model="element.fontSize" ng-options="name for (name, value) in field" class="form-control">
              <option value="">-- Select a Font Size --</option>
            </select>--> </div> <!-- Font Family --> <div ng-switch-when="fontFamily"> <label>Font Family</label> <select ng-model="element.fontFamily" ng-options="name for (name, value) in field" class="form-control"> <option value="">-- Select a Font Family -- </select> </div> <!-- Source --> <div ng-switch-when="src"> <label>Image</label> <div class="dropzone" drop="onDrop($data, $event, key)" drop-effect="copy" drop-accept="'Files'" drag-over-class="drag-over-accept"></div> <button ng-show="config.elements[key].src !== ''" ng-click="removeImage(key)" class="button button-danger"><i class="glyphicon glyphicon-remove"></i> Remove Image</button> </div> <!-- Width / Size --> <div ng-switch-when="width"> <label>Size</label> <input type="range" min="10" max="1000" ng-model="element.width"> </div> <!-- Text Anchor --> <div ng-switch-when="textAnchor"> <label>Text Anchor</label> <select ng-model="element.textAnchor" class="form-control"> <option value="">-- Select a Text Anchor -- <option value="start">Start <option value="middle">Middle <option value="end">End </select> </div> <!-- Opacity --> <div ng-switch-when="opacity"> <label>Opacity</label> <input type="range" min="0" max="1" ng-model="element.opacity" step="0.1"> </div> <!-- Filter --> <div ng-switch-when="filters"> <label>Filter</label> <select ng-model="element.defaultFilter" ng-options="filter for filter in element.editable.filters" class="form-control"> <option value="">No filter </select> </div> </div> <!-- Groups --> <div ng-if="element.type === 'group' && element.elements[k].editable" ng-repeat="(k, e) in element.elements" ng-switch="e.editable" ng-hide="show[key]"> <div ng-repeat="(t, f) in e.editable" ng-switch="t"> <!-- Text --> <div ng-switch-when="text"> <label>Text</label> <textarea ng-model="e.value" class="form-control" ng-change="element.change"></textarea> </div> <!-- Fill --> <div ng-switch-when="fill"> <label>Fill Color</label> <input colorpicker type="text" ng-model="element.elements[k].fill" ng-if="f == 'picker'" class="form-control"> <select ng-model="element.elements[k].fill" ng-options="name for (name, value) in f" class="form-control" ng-if="f != 'picker'"> <option value="">-- Select a Fill Color -- </select> </div> </div> </div> <!-- Text groups --> <div ng-if="element.type === 'textgroup' && element.elements[k].editable" ng-repeat="(k, e) in element.elements" ng-switch="e.editable" ng-hide="show[key]"> <div ng-repeat="(t, f) in e.editable" ng-switch="t"> <!-- Text --> <div ng-switch-when="text"> <label>Text</label> <textarea ng-model="e.value" class="form-control" ng-change="element.change"></textarea> </div> <!-- Fill --> <div ng-switch-when="fill"> <label>Fill Color</label> <input colorpicker type="text" ng-model="element.elements[k].fill" ng-if="f == 'picker'" class="form-control"> <select ng-model="element.elements[k].fill" ng-options="name for (name, value) in f" class="form-control" ng-if="f != 'picker'"> <option value="">-- Select a Fill Color -- </select> </div> </div> </div> <div class="footnote">{{element.helpText()}}</div> </div> </div> </aside> <footer> <h6>Related links: <a href="http://graphicstools.dowjones.net/logger/#/production" target="_blank">Image log</a>, <a href="https://wiki.dowjones.net/display/WSJNews/Cardkit+Image+Generator%3A+How+to" target="_blank">Wiki + design guidelines</a></h6> </footer>
